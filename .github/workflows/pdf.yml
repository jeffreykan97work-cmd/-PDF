name: SMG Monthly PDF Report

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:
    inputs:
      year:
        description: '年份 Year (leave blank = last month)'
        required: false
        default: ''
      month:
        description: '月份 Month (leave blank = last month)'
        required: false
        default: ''

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ghostscript

      - name: Install Python dependencies
        run: pip install playwright==1.51.0 pypdf==4.3.1 requests==2.32.3

      - name: Install Playwright Chromium browser
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: |
          ARGS=""
          [[ -n "${{ github.event.inputs.year }}"  ]] && ARGS="$ARGS --year ${{ github.event.inputs.year }}"
          [[ -n "${{ github.event.inputs.month }}" ]] && ARGS="$ARGS --month ${{ github.event.inputs.month }}"
          python scraper.py $ARGS

      - name: Upload monthly report PDF
        uses: actions/upload-artifact@v4
        with:
          name: SMG-Monthly-Report
          path: SMG_Monthly_Report_*.pdf
          retention-days: 90
          if-no-files-found: warn

      - name: Upload individual article PDFs
        uses: actions/upload-artifact@v4
        with:
          name: SMG-Individual-Articles
          path: smg_tmp_*/
          retention-days: 30
          if-no-files-found: warn

