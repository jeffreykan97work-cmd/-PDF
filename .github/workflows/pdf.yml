name: SMG Monthly PDF Report

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:
    inputs:
      year:
        description: '年份（留空=自動上個月）'
        required: false
        default: ''
      month:
        description: '月份（留空=自動上個月）'
        required: false
        default: ''

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pypdf

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: |
          YEAR="${{ github.event.inputs.year }}"
          MONTH="${{ github.event.inputs.month }}"
          ARGS=""
          [ -n "$YEAR"  ] && ARGS="$ARGS --year $YEAR"
          [ -n "$MONTH" ] && ARGS="$ARGS --month $MONTH"
          python scraper.py $ARGS

      - name: Upload PDF report
        uses: actions/upload-artifact@v4
        with:
          name: SMG-Monthly-Report
          path: SMG_Monthly_Report_*.pdf
          retention-days: 90
          if-no-files-found: warn

      - name: Upload individual PDFs
        uses: actions/upload-artifact@v4
        with:
          name: SMG-Individual-PDFs
          path: smg_tmp_*/
          retention-days: 30
          if-no-files-found: warn
